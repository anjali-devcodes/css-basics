<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="flexbox learning">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">  
        <link rel="stylesheet" href="flexbox.css">  
    </head>
    <body>
        <div class="container">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
            <div class="box">4</div>
            <div class="box">5</div>
            <div class="box">6</div>
            <div class="box">7</div>
        </div>
        <!--justify-content-->
         <div class="justify">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
         </div>
         <!--align-items-->
         <div class="align">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
         </div>
         <!--flex-direction-->
         <div class="flex">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
         </div>
    </body>
</html>
