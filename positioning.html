<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="learn positioning of css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="positioning.css">
    </head>
    <body>
        <div class="grey">relative box</div>
        <!--positioning absolute-->
        <div class="parent">
            <div class="child">absolute box</div>
        </div>
        <!--position fixed-->
        <div class="fixed-box">Fixed</div>
        <p>Scroll content here...</p>
        <p>Scroll content here...</p>
        <p>Scroll content here...</p>
        <p>Scroll content here...</p>
        <p>Scroll content here...</p>
        <p>Scroll content here...</p>
        <!--posittion sticky-->
        <h2 class="sticky">i stick on roll</h2>

        <div class="content">
            <p>Scroll down...</p>
            <p>Scroll down...</p>
            <p>Scroll down...</p>
            <p>Scroll down...</p>
            <p>Scroll down...</p>
        </div>
        <!--z-index position-->
        <div class="z-container">
            <div class="c z-red"></div>
            <div class="c z-blue"></div>
            <div class="c z-grey"></div>
        </div>
    </body>

</html>
